<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime-X-Six</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background-color: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #ff0000; width: 90%; max-width: 400px; margin-top: 50px; text-align: center; }
        
        textarea { width: 100%; height: 100px; background: #000; color: #fff; border: 1px solid #ff0000; border-radius: 5px; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        
        /* Custom File Input */
        .file-upload-wrapper { margin: 10px 0; }
        #imageFile { color: #ff0000; }

        button#postBtn { background: #ff0000; color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 5px; width: 100%; text-transform: uppercase; }
        
        /* Floating Buttons */
        .btn-bottom { position: fixed; bottom: 20px; background-color: #ff0000; color: white; padding: 12px 20px; border-radius: 25px; font-weight: bold; text-decoration: none; border: 2px solid #fff; }
        .left { left: 20px; }
        .right { right: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Post Your Content</h2>
        <textarea id="comment" placeholder="Kuch likhein..."></textarea>
        <div class="file-upload-wrapper">
            <input type="file" id="imageFile" accept="image/*">
        </div>
        <button id="postBtn" onclick="submitData()">COMMENT</button>
    </div>

    <a href="home.html" class="btn-bottom left">HOME</a>
    <a href="YOUR_APP_DOWNLOAD_LINK_HERE" class="btn-bottom right">Download App</a>

    <script>
        // --- 1. CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        const IMGBB_API_KEY = "YOUR_IMGBB_API_KEY_HERE";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- 2. UPLOAD LOGIC ---
        async function submitData() {
            const comment = document.getElementById('comment').value;
            const file = document.getElementById('imageFile').files[0];

            if (!comment || !file) {
                alert("Please write a comment and select an image!");
                return;
            }

            // Uploading to ImgBB
            const formData = new FormData();
            formData.append('image', file);
            
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                const imageUrl = result.data.url;

                // Saving to Firebase
                await db.collection("posts").add({
                    text: comment,
                    image: imageUrl,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert("Successfully Posted!");
                location.reload();
            } catch (error) {
                alert("Error: " + error.message);
            }
        }
    </script>
</body>
</html>
