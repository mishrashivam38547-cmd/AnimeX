<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="style.css"> <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="header-card">
        <img src="shikimori.jpg" alt="Miyako Shikimori" class="avatar">
        <div class="message">
            <h3>Hey Anime Lover's!</h3>
            <p>Streaming Free Anime in <b>Hindi</b> language.</p>
        </div>
    </div>

    <div id="feed"></div>
    
    <a href="YOUR_LINK" class="fixed-btn">Download App</a>
</body>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB4vuzHiSmQ0l6vEIOo3gP8rYfwvPpod8A",
            authDomain: "animex-abbc3.firebaseapp.com",
            projectId: "animex-abbc3",
            storageBucket: "animex-abbc3.appspot.com",
            messagingSenderId: "242509729600",
            appId: "1:242509729600:web:001113ec899c340e67f4a5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("posts").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach(doc => {
                const p = doc.data();
                feed.innerHTML += `<div class="post">
                    <img src="${p.image}">
                    <p>${p.caption}</p>
                </div>`;
            });
        });
    </script>
    <link rel="stylesheet" href="style.css">
</body>
</html>
