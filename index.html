<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Feed</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 50px auto; background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        textarea { width: 90%; height: 80px; background: #000; color: #fff; border: 1px solid #ff0000; padding: 10px; border-radius: 5px; }
        input[type="file"] { margin: 15px 0; color: #ff0000; }
        button { background: #ff0000; color: white; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; width: 100%; }
        button:hover { background: #990000; }
        
        /* Fixed App Button */
        .fixed-download {
            position: fixed; bottom: 20px; right: 20px;
            background-color: #ff0000; padding: 15px 25px;
            border-radius: 50px; color: white; text-decoration: none;
            font-weight: bold; box-shadow: 0 4px 10px rgba(255,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Post Your Content</h2>
        <textarea id="comment" placeholder="Kuch likhein..."></textarea>
        <br>
        <input type="file" id="imageFile" accept="image/*">
        <br>
        <button onclick="submitData()">SUBMIT POST</button>
    </div>

    <a href="YOUR_APP_DOWNLOAD_LINK_HERE" class="fixed-download">Download App</a>

    <script>
        // --- CONFIGURATION AREA ---
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        const IMGBB_API_KEY = "YOUR_IMGBB_API_KEY_HERE";
        // ---------------------------

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function submitData() {
            const comment = document.getElementById('comment').value;
            const file = document.getElementById('imageFile').files[0];

            if (!comment || !file) { alert("Sabhi fields bharein!"); return; }

            // 1. ImgBB Upload
            const formData = new FormData();
            formData.append('image', file);
            
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            const imageUrl = result.data.url;

            // 2. Firebase Save
            db.collection("posts").add({
                text: comment,
                image: imageUrl,
                createdAt: new Date()
            }).then(() => {
                alert("Post successful!");
                location.reload();
            }).catch(e => alert("Error: " + e));
        }
    </script>
</body>
</html>
