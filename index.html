<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; padding: 20px; font-family: sans-serif; }
        .post { background: #1a1a1a; border: 1px solid #ff0000; border-radius: 10px; margin-bottom: 20px; padding: 15px; max-width: 500px; margin: 20px auto; }
        img { width: 100%; border-radius: 5px; }
        .fixed-btn { position: fixed; bottom: 20px; right: 20px; background: #ff0000; padding: 15px 25px; border-radius: 50px; text-decoration: none; color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="feed"></div>
    <a href="YOUR_APP_LINK" class="fixed-btn">Download App</a>

    <script>
        const firebaseConfig = { /* APNA FIREBASE CONFIG YAHAN DALEIN */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("posts").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach(doc => {
                const p = doc.data();
                feed.innerHTML += `<div class="post">
                    <img src="${p.image}">
                    <p>${p.caption}</p>
                </div>`;
            });
        });
    </script>
</body>
</html>
