<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; padding: 50px; font-family: sans-serif; }
        .card { background: #1a1a1a; padding: 30px; border: 1px solid #ff0000; border-radius: 15px; max-width: 400px; margin: auto; }
        textarea, input { width: 90%; margin: 10px 0; padding: 10px; color: #fff; background: #000; border: 1px solid #ff0000; }
        button { background: #ff0000; color: #fff; border: none; padding: 15px 30px; cursor: pointer; font-weight: bold; width: 95%; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Admin Panel</h2>
        <textarea id="caption" placeholder="Caption likhein..."></textarea><br>
        <input type="file" id="imageFile"><br>
        <button onclick="uploadData()">UPLOAD POST</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB4vuzHiSmQ0l6vEIOo3gP8rYfwvPpod8A",
            authDomain: "animex-abbc3.firebaseapp.com",
            projectId: "animex-abbc3",
            storageBucket: "animex-abbc3.appspot.com",
            messagingSenderId: "242509729600",
            appId: "1:242509729600:web:001113ec899c340e67f4a5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function uploadData() {
    const caption = document.getElementById('caption').value;
    const fileInput = document.getElementById('imageFile');
    
    if (fileInput.files.length === 0) {
        alert("Pehle photo select karein!");
        return;
    }

    const file = fileInput.files[0];
    const IMGBB_API = "0de43554e74e8ef8afc0f49cccf0d1f";

    try {
        // 1. ImgBB Upload
        const formData = new FormData();
        formData.append('image', file);
        
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API}`, {
            method: 'POST',
            body: formData
        });
        const data = await res.json();

        if (!data.success) {
            alert("ImgBB Error: " + data.error.message);
            return;
        }

        // 2. Firebase Upload
        await db.collection("posts").add({
            caption: caption,
            image: data.data.url,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        alert("Successfully Uploaded!");
        location.reload();

    } catch (error) {
        alert("Error: " + error.message);
    }
        }
        
    </script>
</body>
</html>
